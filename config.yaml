capital_usdt: 100000
mode: perp                     # USDT本位永续合约,支持双向(做多/做空)+杠杆
benchmark: BTC_HOLD            # 基准:期初全仓买入BTC现货持有不动(1倍,无杠杆)
universe_rule:                 # 币池不再是固定名单,而是LOCKED区代码强制的筛选规则
  source: binance_usdt_perp    # 只允许币安USDT本位永续合约已上市交易对
  min_24h_volume_usdt: 100e6   # 24h成交额 >= 1亿USDT(流动性门槛)
  min_listing_days: 90         # 上市不足90天的新币排除(防上线拉盘/土狗)
  refresh: weekly              # 每周一刷新一次合格名单,写入universe_active.json
  blacklist: []                # 人类可手动追加排除项,agent无权修改
leverage:
  max: 10                      # 硬上限10倍,LOCKED区强制,超过即Rejection
  default: 3                   # agent未指定时的默认杠杆
fees:
  taker_pct: 0.0005            # 币安USDT永续taker 0.05%
  slippage_bps: 15             # 从严不从宽;若标的24h成交额<5亿,滑点自动加倍
funding:
  settle_hours_utc: [0, 8, 16] # 每8小时结算一次,币安标准时点
  source: real                 # 用ccxt拉取真实资金费率结算,不自己复现溢价公式
constraints:
  max_position_notional_pct: 100   # 单币名义仓位上限:不超过净值的100%(即单币最多10倍杠杆下用10%保证金)
  max_total_notional_pct: 300      # 全组合名义敞口上限:净值的300%(总杠杆实际上限3倍,见说明)
  min_free_margin_pct: 15          # 最低可用保证金比例
  max_drawdown_pct: 20             # 总回撤熔断线
  daily_loss_freeze_pct: 8         # 单日净值跌超8% → 冻结24h强制反思
  liquidation_policy: branch_death # 任何一次模拟爆仓 = 当前策略分支立即判FAIL
cycle:
  decision_interval_hours: 4
  reflection_per_day: 2
  ratchet_interval_days: 3
evolution:                       # M4 棘轮进化(§3.5)
  max_concurrent_branches: 3     # 同时并行分支数上限
  min_promote_edge_pct: 0.5      # PROMOTE最小优势门槛:候选分支窗口内收益率必须
                                  # 领先主线 >= 此值(百分点,0.5 = 50bps)才允许晋升;
                                  # 平局或微弱优势一律维持主线(多重比较问题:并行
                                  # 分支+高频判定,没有门槛棘轮会被运气缓慢填满)
data:
  exchange: binance
  timeframe: 4h
  history_days: 730

capital_usdt: 100000
mode: perp                     # USDT本位永续合约,支持双向(做多/做空)+杠杆
benchmark: BTC_HOLD            # 基准:期初全仓买入BTC现货持有不动(1倍,无杠杆)
universe_rule:                 # 币池不再是固定名单,而是LOCKED区代码强制的筛选规则
  source: okx_usdt_perp        # M5 shakedown 期间由 binance_usdt_perp 改为 okx_usdt_perp:
                                # 本沙箱网络环境下 api.binance.com/fapi.binance.com 对该出口IP
                                # 返回 HTTP 451(Binance 自身的地域限制,不是本地防火墙),经用户
                                # 确认后切换到 OKX(USDT本位永续,ccxt统一接口验证可用、资金费率
                                # 同为0/8/16 UTC三时点结算)。只允许OKX USDT本位永续合约已上市交易对
  min_24h_volume_usdt: 100e6   # 24h成交额 >= 1亿USDT(流动性门槛)
  min_listing_days: 90         # 上市不足90天的新币排除(防上线拉盘/土狗)
  refresh: weekly              # 每周一刷新一次合格名单,写入universe_active.json
  blacklist: []                # 人类可手动追加排除项,agent无权修改
leverage:
  max: 50                      # 硬上限50倍,LOCKED区强制,超过即Rejection。用户为
                                # 快速验证阶段主动放宽(原为10倍),明确知情:50倍下
                                # 价格反向约2%即触及爆仓,比risk_check.emergency_exit_
                                # drawdown_pct(5%)更容易先被爆仓而不是被哨兵保护住
  default: 3                   # agent未指定时的默认杠杆,未跟随max一起放宽——具体
                                # 每笔决策用多少杠杆仍由Trader按thesis自行判断
fees:
  taker_pct: 0.0005            # OKX USDT永续taker 0.05%(实测与原先假设的币安费率数值相同,未改动)
  slippage_bps: 15             # 从严不从宽;若标的24h成交额<5亿,滑点自动加倍
funding:
  settle_hours_utc: [0, 8, 16] # 每8小时结算一次,OKX与币安一致的三时点
  source: real                 # 用ccxt拉取真实资金费率结算,不自己复现溢价公式
constraints:
  max_position_notional_pct: 100   # 单币名义仓位上限:不超过净值的100%(即单币最多10倍杠杆下用10%保证金)
  max_total_notional_pct: 300      # 全组合名义敞口上限:净值的300%(总杠杆实际上限3倍,见说明)
  min_free_margin_pct: 15          # 最低可用保证金比例
  max_drawdown_pct: 20             # 总回撤熔断线
  daily_loss_freeze_pct: 8         # 单日净值跌超8% → 冻结24h强制反思
  liquidation_policy: branch_death # 任何一次模拟爆仓 = 当前策略分支立即判FAIL
cycle:                           # 用户明确要求"快速验证"改成的高频节拍(原为4h/
                                  # 2次天/3天),见 scripts/ignite.py 模块docstring
                                  # 的完整节拍说明
  decision_interval_hours: 0.5   # 30分钟一次正式决策(原4小时)
  reflection_per_day: 48         # 48次/天 = 每30分钟一次,与决策周期同步(原2次/天)
  research_interval_hours: 1     # 每小时一次(原本是"每个UTC自然日一次",新字段,
                                  # 之前没有独立配置项,直接硬编码在ignite.py里)
  ratchet_interval_hours: 2      # 每2小时一次(原ratchet_interval_days: 3天)。
                                  # 见下方"方案2"说明:LOCKED的官方棘轮评分
                                  # (scorer.ratchet_score)仍然只读nav.tsv这份天
                                  # 粒度权威历史,不改;这个2小时节拍目前调用的还是
                                  # 同一个main.py.run_ratchet_judgment,只是频率变高——
                                  # 在还没有任何候选分支被注册之前,不管几小时调一次
                                  # 都是"0条候选分支裁决"的空跑,粒度问题本身要等真的
                                  # 有候选分支(多分支并行,单独设计的后续功能)时才
                                  # 有意义去解决,不是现在就要改LOCKED评分逻辑。
evolution:                       # M4 棘轮进化(§3.5)
  max_concurrent_branches: 100   # 同时并行分支数上限。用户2026-07-14要求从3
                                  # 提到5(配合scripts/ignite.py同时注册5个
                                  # 战术不同的evo候选分支),后来因为战术锦标赛
                                  # (见ignite.py的tactic_tournament机制)不再
                                  # 调用EvolutionOrchestrator.judge()评估这些
                                  # 分支,只用register_branch()做webui展示用的
                                  # 登记——这意味着这个计数器在orchestrator内部
                                  # 视角下只会单调增长(锦标赛淘汰/晋升一个分支
                                  # 时不会告诉orchestrator它已经"退场"),不再是
                                  # "同时真正并行交易的分支数",而是"系统生命周期
                                  # 内累计出现过的战术候选总数上限",所以放宽到
                                  # 一个较大的数字给足够的头寸,而不是维持原来
                                  # 反映"当前并行数"的5。
  min_promote_edge_pct: 0.5      # PROMOTE最小优势门槛:候选分支窗口内收益率必须
                                  # 领先主线 >= 此值(百分点,0.5 = 50bps)才允许晋升;
                                  # 平局或微弱优势一律维持主线(多重比较问题:并行
                                  # 分支+高频判定,没有门槛棘轮会被运气缓慢填满)
tactic_tournament:                # 用户要求"自动进化+晋升赢家"(2026-07-14)。这是
                                  # 独立于上面 evolution/EvolutionOrchestrator.judge()
                                  # 的一套并行机制,不是同一样东西——后者假设候选分支
                                  # 是真实git分支、一次性裁决后永久退出候选池(见
                                  # LOCKED/evolution_orchestrator.py judge() 步骤5),
                                  # 不适合"5个纯提示词战术、需要反复观察、不能一次性
                                  # 判死"这个场景。见scripts/ignite.py模块docstring的
                                  # 完整设计说明。
  min_hours_before_judgment: 4   # 分支至少存活这么多小时才有资格被判定,避免样本
                                  # 太少(比如只有1-2个小时级净值点)就仓促下结论
  promote_edge_pct: 0.5          # 相对main的净值优势阈值(百分点),与上面
                                  # evolution.min_promote_edge_pct同一量纲,数值先保持一致
  fail_drawdown_pct: 15          # 分支自身净值从其历史峰值回撤超过这个百分比 ->
                                  # 判定失败退场,强制平仓,不等main分支的
                                  # constraints.max_drawdown_pct(20%,组合级熔断)
data:
  exchange: okx                # M5 shakedown 期间由 binance 改为 okx(见 universe_rule.source 注释)
  timeframe: 4h
  history_days: 730
risk_check:                      # M5 点火过程中用户新增的一条护栏(不在原spec v1.2里):
                                  # 正式决策仍然4小时一次(见cycle.decision_interval_hours),
                                  # 但用户认为分钟级行情里可能出现4小时内来不及等正式决策
                                  # 就已经把仓位打穿的情况,加一层更高频、但刻意做成"确定性
                                  # 代码判断、不走LLM"的紧急哨兵(见LOCKED/position_risk_monitor.py
                                  # 模块docstring:紧急操作等不起agent签入推理的延迟)。
  interval_hours: 1              # 每小时跑一次
  recent_window_minutes: 300     # 用最近5小时(300根1分钟K线,OKX单次调用上限
                                  # 内,不需要分页)的分钟线判断"从最近高点/低点的回撤"
  emergency_exit_drawdown_pct: 5 # 单个持仓从最近窗口内高点(多头)/低点(空头)反向
                                  # 移动超过这个百分比 -> 立即提交close决策,不经过Trader。
                                  # 比daily_loss_freeze_pct(8%,账户级)更紧,因为这是
                                  # 单仓位级别的哨兵,不是替代circuit_breaker的组合熔断

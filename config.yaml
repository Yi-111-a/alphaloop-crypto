capital_usdt: 100               # 用户2026-07-15清零重启:每个分支从100U开始
                                  # (原100000)。模拟器所有费率/仓位/风控都是
                                  # 百分比制,数学上完全成立;致敬凉兮1000元起家
mode: perp                     # USDT本位永续合约,支持双向(做多/做空)+杠杆
llm:                           # LLM来源(2026-07-15新增,24h无人值守服务器模式)
  mode: bridge                 # bridge=签入agent文件握手(本地开发/人工介入);
                                # api=直连Anthropic API(服务器上改成这个)。
                                # api模式需要环境变量 ANTHROPIC_API_KEY
  api:
    base_url: https://api.deepseek.com/anthropic  # 用户2026-07-15选定DeepSeek的
                                # Anthropic格式兼容端点(约¥3-5/天,比官方API便宜
                                # 一个数量级)。删掉这行即回到官方Anthropic端点
    trader_model: deepseek-v4-flash    # 例行决策周期,量大用便宜模型
    deep_model: deepseek-v4-pro        # 反思/研究/替补战术设计,量小用强模型
    max_daily_calls: 600       # 两档共用的每日总调用预算,超了当天剩余周期全部
                                # 走安全降级(hold/skip),UTC零点自动恢复——防止
                                # bug死循环烧账单的最后一道闸
    providers:                 # 分支级认知多样性(2026-07-16用户要求):不同
                                # 分支用不同供应商的大脑,打破单一模型的思维趋同。
                                # 与上面的 base_url/trader_model/deep_model 并存
                                # 而不是二选一——上面几行是老字段,继续被"没有
                                # providers段"的旧config/旧测试使用,行为不变;
                                # providers段是新增的分支路由入口,ignite.py的
                                # build_provider_clients只读这里。
                                #
                                # 最终形态(用户2026-07-16两次修正后确认,核实
                                # 官方文档得到):火山方舟Agent Plan是一个订阅制
                                # 端点(https://ark.cn-beijing.volces.com/api/plan,
                                # Anthropic消息格式+Authorization: Bearer认证),
                                # 一份ARK_API_KEY下可以自由切换五家厂商的模型
                                # (豆包/智谱GLM/Kimi/MiniMax/DeepSeek),不是每家
                                # 单独一把key——所以下面ark-*那五个供应商共享同
                                # 一个api_key_env=ARK_API_KEY,只有trader_model/
                                # deep_model不同,这才是真正的"多个大脑"。
      deepseek:                # 默认供应商(main分支专用+兜底):保持现有DeepSeek
                                # 官方直连端点,不切到ark订阅——独立计费/独立端点
                                # 本身就是一种韧性(ark端点整体故障不影响main这条
                                # 擂主基准线);也是分支查不到/供应商未配置时的
                                # 兜底选择。复用上面的base_url/模型,数值故意保持
                                # 一致,不是两份独立配置。
        format: anthropic
        base_url: https://api.deepseek.com/anthropic
        api_key_env: ANTHROPIC_API_KEY
        auth: api_key           # DeepSeek走x-api-key头,不是Bearer
        trader_model: deepseek-v4-flash
        deep_model: deepseek-v4-pro
      ark-doubao:               # 以下五个ark-*供应商共享同一个火山方舟Agent Plan
                                # 订阅端点+同一把ARK_API_KEY,Authorization: Bearer
                                # 认证(auth_token),只有模型名不同——这是真正驱动
                                # "分支级认知多样性"的五个不同厂商大脑。
        format: anthropic
        base_url: https://ark.cn-beijing.volces.com/api/plan
        api_key_env: ARK_API_KEY
        auth: auth_token
        timeout_seconds: 480  # 思考模型(kimi-k2.7等)完整交易prompt实测可超默认180s读超时
        max_tokens: 16384     # 思考块计入max_tokens,kimi等思考模型4096会被思考耗尽导致text为空(实测)
        trader_model: doubao-seed-2.0-lite  # 模型名/套餐别名以用户Ark Agent Plan
        deep_model: doubao-seed-2.0-pro      # 套餐实际支持的列表为准,真实key冒烟
                                              # 测试时校准
      ark-glm:
        format: anthropic
        base_url: https://ark.cn-beijing.volces.com/api/plan
        api_key_env: ARK_API_KEY
        auth: auth_token
        timeout_seconds: 480  # 思考模型(kimi-k2.7等)完整交易prompt实测可超默认180s读超时
        max_tokens: 16384     # 思考块计入max_tokens,kimi等思考模型4096会被思考耗尽导致text为空(实测)
        trader_model: glm-5.2
        deep_model: glm-5.2
      ark-kimi:
        format: anthropic
        base_url: https://ark.cn-beijing.volces.com/api/plan
        api_key_env: ARK_API_KEY
        auth: auth_token
        timeout_seconds: 480  # 思考模型(kimi-k2.7等)完整交易prompt实测可超默认180s读超时
        max_tokens: 16384     # 思考块计入max_tokens,kimi等思考模型4096会被思考耗尽导致text为空(实测)
        trader_model: kimi-k2.6
        deep_model: kimi-k2.7-code
      ark-minimax:
        format: anthropic
        base_url: https://ark.cn-beijing.volces.com/api/plan
        api_key_env: ARK_API_KEY
        auth: auth_token
        timeout_seconds: 480  # 思考模型(kimi-k2.7等)完整交易prompt实测可超默认180s读超时
        max_tokens: 16384     # 思考块计入max_tokens,kimi等思考模型4096会被思考耗尽导致text为空(实测)
        trader_model: minimax-m2.7
        deep_model: minimax-m3
      ark-deepseek:             # 同一个DeepSeek模型也可以从ark订阅走(省掉直连的
                                # token费用),与上面独立直连的deepseek并存——
                                # 分配器把它们当成两个不同的供应商身份(不同端点/
                                # 不同计费/不同故障域),不是重复配置。
        format: anthropic
        base_url: https://ark.cn-beijing.volces.com/api/plan
        api_key_env: ARK_API_KEY
        auth: auth_token
        timeout_seconds: 480  # 思考模型(kimi-k2.7等)完整交易prompt实测可超默认180s读超时
        max_tokens: 16384     # 思考块计入max_tokens,kimi等思考模型4096会被思考耗尽导致text为空(实测)
        trader_model: deepseek-v4-flash
        deep_model: deepseek-v4-pro
benchmark: BTC_HOLD            # 基准:期初全仓买入BTC现货持有不动(1倍,无杠杆)
universe_rule:                 # 币池不再是固定名单,而是LOCKED区代码强制的筛选规则
  source: okx_usdt_perp        # M5 shakedown 期间由 binance_usdt_perp 改为 okx_usdt_perp:
                                # 本沙箱网络环境下 api.binance.com/fapi.binance.com 对该出口IP
                                # 返回 HTTP 451(Binance 自身的地域限制,不是本地防火墙),经用户
                                # 确认后切换到 OKX(USDT本位永续,ccxt统一接口验证可用、资金费率
                                # 同为0/8/16 UTC三时点结算)。只允许OKX USDT本位永续合约已上市交易对
  min_24h_volume_usdt: 100e6   # 24h成交额 >= 1亿USDT(流动性门槛)
  min_listing_days: 90         # 上市不足90天的新币排除(防上线拉盘/土狗)
  refresh: weekly              # 每周一刷新一次合格名单,写入universe_active.json
  blacklist: []                # 人类可手动追加排除项,agent无权修改
leverage:
  max: 100                     # 硬上限100倍,LOCKED区强制,超过即Rejection。用户
                                # 2026-07-14要求新增一个模仿"凉兮"风格(真实报道的
                                # 币圈交易员,2021年用100倍杠杆滚仓策略把1000元做到
                                # 4000多万,随后同样用100倍杠杆判断失误爆仓、倒欠
                                # 数百万——这是一个有据可查的真实高杠杆爆仓案例,
                                # 不是虚构的稳健策略)的evo候选分支,明确要求允许
                                # 到100倍。leverage.max是LOCKED区全局单一硬上限,
                                # 没有"只给某个分支开权限"的机制,所以这里是全局
                                # 提高,对所有分支的技术天花板都生效(其他分支自己
                                # 的战术文字大概率不会真用到这么高,历史上最高只
                                # 用到过10倍,见进取分支)。用户已明确知情该风格
                                # 本身的历史结局是爆仓,选择保留这个真实教训。
                                # 100倍下价格反向约1%即触及爆仓,比风控哨兵5%回撤
                                # 阈值、锦标赛15%回撤淘汰线都窄得多——高杠杆仓位
                                # 大概率会在这两道防线生效前就已经被交易所强平逻辑
                                # (_unrealized_pnl计算)直接打没。
  default: 3                   # agent未指定时的默认杠杆,未跟随max一起放宽——具体
                                # 每笔决策用多少杠杆仍由Trader按thesis自行判断
fees:
  taker_pct: 0.0005            # OKX USDT永续taker 0.05%(实测与原先假设的币安费率数值相同,未改动)
  slippage_bps: 15             # 从严不从宽;若标的24h成交额<5亿,滑点自动加倍
funding:
  settle_hours_utc: [0, 8, 16] # 每8小时结算一次,OKX与币安一致的三时点
  source: real                 # 用ccxt拉取真实资金费率结算,不自己复现溢价公式
constraints:
  max_position_notional_pct: 100   # 单币名义仓位上限:不超过净值的100%(即单币最多10倍杠杆下用10%保证金)
  max_total_notional_pct: 10000    # 用户2026-07-18:"300%上限也给去了"——大脑德比
                                   # 全放开,总敞口上限设为实际不可能触及的10000%
                                   # (单仓仍受max_position_notional_pct=100%约束,
                                   # 13个标的理论极限1300%,远够不到这个数)。风险
                                   # 控制交还给每个大脑自己:爆仓即死+15%回撤淘汰
                                   # 就是全部的惩罚机制,这正是德比要比的东西
  min_free_margin_pct: 15          # 最低可用保证金比例
  max_drawdown_pct: 20             # 总回撤熔断线
  daily_loss_freeze_pct: 8         # 单日净值跌超8% → 冻结24h强制反思
  liquidation_policy: branch_death # 任何一次模拟爆仓 = 当前策略分支立即判FAIL
cycle:                           # 用户明确要求"快速验证"改成的高频节拍(原为4h/
                                  # 2次天/3天),见 scripts/ignite.py 模块docstring
                                  # 的完整节拍说明
  decision_interval_hours: 0.0833333  # =5分钟。第五代架构(2026-07-18,quant_derby
                                  # 模式专用值):所有分支(含main)都是零LLM的
                                  # 确定性代码策略(见DispatchingTrader+policy_id),
                                  # 5分钟一次决策周期不产生任何额外API调用成本,
                                  # 代码执行本身很便宜。**若切回brain_derby/
                                  # tactic_evolution等"大脑直接交易"的模式,必须
                                  # 改回0.5**,否则每个决策周期都是一次真实付费
                                  # LLM调用,5分钟节拍下调用量是30分钟节拍的6倍,
                                  # API成本会直接爆炸。
  reflection_per_day: 12         # 每2小时一轮反思(2026-07-15从48降下来:反思
                                  # 现在覆盖main+全部active分支,一轮就是7-8次
                                  # deep模型调用,48轮/天太贵且30分钟内几乎没有
                                  # 新判定结果可反思,大多是重复噪声)
  research_interval_hours: 1     # 每小时一次(原本是"每个UTC自然日一次",新字段,
                                  # 之前没有独立配置项,直接硬编码在ignite.py里)
  ratchet_interval_hours: 2      # 每2小时一次(原ratchet_interval_days: 3天)。
                                  # 见下方"方案2"说明:LOCKED的官方棘轮评分
                                  # (scorer.ratchet_score)仍然只读nav.tsv这份天
                                  # 粒度权威历史,不改;这个2小时节拍目前调用的还是
                                  # 同一个main.py.run_ratchet_judgment,只是频率变高——
                                  # 在还没有任何候选分支被注册之前,不管几小时调一次
                                  # 都是"0条候选分支裁决"的空跑,粒度问题本身要等真的
                                  # 有候选分支(多分支并行,单独设计的后续功能)时才
                                  # 有意义去解决,不是现在就要改LOCKED评分逻辑。
evolution:                       # M4 棘轮进化(§3.5)
  max_concurrent_branches: 4     # 改造规格书M8§4.2:从100收回到4。100是M7之前
                                  # "锦标赛分支不走judge()、只用register_branch()
                                  # 做展示登记"这个阶段的产物(见下方保留的
                                  # 历史注释)——M8让"代码化策略分支PROMOTE时
                                  # 真正调用judge()+GitMergeExecutor"这条链路
                                  # 对真实分支生效之后,这个数字重新变成一个
                                  # 有真实意义的并行上限(前向池真的会有多个
                                  # 分支在候审真实晋升),不能再放任它单调增长
                                  # 到100这种形同虚设的数字。
                                  #
                                  # 历史注释(M4时期,值为100时的理由,保留
                                  # 供追溯):用户2026-07-14要求从3提到5(配合
                                  # scripts/ignite.py同时注册5个战术不同的evo
                                  # 候选分支),后来因为战术锦标赛(见ignite.py
                                  # 的tactic_tournament机制)不再调用
                                  # EvolutionOrchestrator.judge()评估这些分支,
                                  # 只用register_branch()做webui展示用的登记——
                                  # 这意味着这个计数器在orchestrator内部视角下
                                  # 只会单调增长,不再是"同时真正并行交易的
                                  # 分支数",所以当时放宽到了100。
  min_promote_edge_pct: 0.5      # PROMOTE最小优势门槛:候选分支窗口内收益率必须
                                  # 领先主线 >= 此值(百分点,0.5 = 50bps)才允许晋升;
                                  # 平局或微弱优势一律维持主线(多重比较问题:并行
                                  # 分支+高频判定,没有门槛棘轮会被运气缓慢填满)
tactic_tournament:                # 用户要求"自动进化+晋升赢家"(2026-07-14)。这是
                                  # 独立于上面 evolution/EvolutionOrchestrator.judge()
                                  # 的一套并行机制,不是同一样东西——后者假设候选分支
                                  # 是真实git分支、一次性裁决后永久退出候选池(见
                                  # LOCKED/evolution_orchestrator.py judge() 步骤5),
                                  # 不适合"5个纯提示词战术、需要反复观察、不能一次性
                                  # 判死"这个场景。见scripts/ignite.py模块docstring的
                                  # 完整设计说明。
  mode: quant_derby                # 三选一:
                                  #   quant_derby(第五代架构,2026-07-18用户最终
                                  #     指令"废除大模型直接交易——所有交易由确定性
                                  #     策略代码执行,大模型转岗为量化研究员",
                                  #     现行模式):每个大脑一个分支,从建档起就带
                                  #     policy_id,全部走M7确定性代码路径零LLM
                                  #     交易;大脑每小时研究、改码须过回测关卡才能
                                  #     接管交易权;出局同一大脑带着已验证的
                                  #     policy_id/policy_history满血复活(账户清零,
                                  #     研究成果不清零);PROMOTE直接切换
                                  #     state/main_policy.json,不走M8 git-merge链路。
                                  #   brain_derby(上一代,2026-07-16~07-18):所有
                                  #     evo分支拿到一字不差的中性任务书,大脑直接
                                  #     交易;出局同一个大脑带新100U满血复活;
                                  #     PROMOTE=大脑本体接管main(state/main_brain.json)。
                                  #   tactic_evolution(缺省,最早的历史模式):
                                  #     性格分支+LLM生成替补战术。
  min_hours_before_judgment: 168 # 改造规格书M8§4.2:从4小时收紧到168小时(7天)。
                                  # 信噪比理由:窗口太短时,小时级净值的正常波动
                                  # 量级(尤其是高杠杆/高频分支)本身就能轻易超过
                                  # 真实优势的量级,4小时窗口下"偶然赢一把"和
                                  # "真的更强"在统计上几乎无法区分,棘轮会被噪声
                                  # 缓慢填满而不是被真实alpha填满。7天给足够多的
                                  # 决策周期让真实优势(如果存在)在噪声上显现出来
  promote_edge_pct: 0.5          # 相对main的净值优势阈值(百分点),与上面
                                  # evolution.min_promote_edge_pct同一量纲,数值先保持一致
  fail_drawdown_pct: 15          # 分支自身净值从其历史峰值回撤超过这个百分比 ->
                                  # 判定失败退场,强制平仓,不等main分支的
                                  # constraints.max_drawdown_pct(20%,组合级熔断)
  cull_interval_hours: 72        # 改造规格书M8§4.2:从12小时收紧到72小时(3天)。
                                  # 同上信噪比理由:12小时窗口的波动量级淹没了
                                  # 半日优势的量级,末位斩杀在这个窗口长度下更像
                                  # 是在按噪声排名、而不是按真实相对表现排名,
                                  # 与min_hours_before_judgment的收紧是同一个修正
  cull_min_age_hours: 72         # 改造规格书M8§4.2:与上面新的斩杀窗口
                                  # (cull_interval_hours=72)保持一致——新分支
                                  # 保护期理应覆盖至少一个完整的考核窗口,否则
                                  # 窗口拉长之后这个保护期反而比窗口本身还短,
                                  # 起不到"新分支至少活过一轮考核"的保护作用
quant_derby:                     # 量化研究员德比专属配置(第五代架构,2026-07-18)。
                                  # 与上面 tactic_tournament 段并存而不是合并进去——
                                  # 那一段是"锦标赛裁决"这一层(晋升/淘汰/复活的
                                  # 阈值),这一段是"研究员模块"这一层(大脑多久
                                  # 审一次自己的代码、多久允许提交一次新代码),
                                  # 两层节拍互相独立,分开配置更清楚。
  seed_policy: flat_v1            # 每个新分支(首次建档/复活)起步用的种子策略
                                  # policy_id,对应 ASSET/strategy/policies/
                                  # flat_v1.py(恒空仓)。scripts/ignite.py的
                                  # build_quant_derby_defaults读这里,不是硬编码。
  proposal_cooldown_hours: 4      # 大脑研究员提交一次新策略代码后,至少要等这么久
                                  # 才允许再次提交下一版——防止一次决策周期改一次码
                                  # 这种高频抖动,给回测/观察留出有意义的时间窗口。
                                  # 由研究员模块(scripts/brain_researcher.py)读取
                                  # 并自行节拍控制,本文件只声明数值。
  review_interval_hours: 1        # 大脑研究员的例行研究/复盘节拍(分析行情、复盘
                                  # 历史决策表现、判断是否需要改代码),与
                                  # cycle.research_interval_hours是两个独立的
                                  # "研究"概念——那个是main.py既有的Researcher
                                  # 通用市场研究,这个是量化德比里"研究员盯着自己
                                  # 这个分支的策略代码表现"这一新增职责的专属节拍。
                                  # 由研究员模块读取并自行节拍控制,本文件只声明数值。
backtest:                          # M6 内环回测(改造规格书§5,2026-07-15)
  scratch_root: ASSET/strategy/experiments   # 回测产物隔离目录,绝不碰生产LOG/state
  windows:
    train_days: 365
    val_window_days: 90
    val_window_count: 2            # 至少2个独立验证窗口(防过拟合:评分取最差窗口)
    holdout_days: 90               # 时间上最新的一段,内环迭代期间不可见,
                                    # 只在晋升评审报告里做事后一致性检验
  min_history_days_required: 730   # 与 data.history_days 一致
  max_experiments_per_night: 50    # 软上限,防内环失控刷屏(LLM预算另由llm.api.max_daily_calls管)
  min_val_trades: 10               # 最小样本量门槛(2026-07-15新增):所有非holdout验证窗口的
                                    # trade_count总和低于这个数,不管分数多高一律revert——防止
                                    # 2-3笔交易靠运气拿到高分就晋级。量化的统计优势前提是样本量:
                                    # 52%胜率×1万次才是大数定律生效的场景,×3次只是抛硬币。

data:
  exchange: okx                # M5 shakedown 期间由 binance 改为 okx(见 universe_rule.source 注释)
  timeframe: 4h
  history_days: 730
risk_check:                      # M5 点火过程中用户新增的一条护栏(不在原spec v1.2里):
                                  # 正式决策仍然4小时一次(见cycle.decision_interval_hours),
                                  # 但用户认为分钟级行情里可能出现4小时内来不及等正式决策
                                  # 就已经把仓位打穿的情况,加一层更高频、但刻意做成"确定性
                                  # 代码判断、不走LLM"的紧急哨兵(见LOCKED/position_risk_monitor.py
                                  # 模块docstring:紧急操作等不起agent签入推理的延迟)。
  interval_hours: 1              # 确定性紧急平仓哨兵本身的判定节拍,每小时跑一次,
                                  # 不受下面mark_interval_minutes影响——那个只管面板
                                  # 展示数字多久刷新,不改变哨兵自己的判定频率。
  recent_window_minutes: 300     # 用最近5小时(300根1分钟K线,OKX单次调用上限
                                  # 内,不需要分页)的分钟线判断"从最近高点/低点的回撤"
  emergency_exit_drawdown_pct: 5 # 单个持仓从最近窗口内高点(多头)/低点(空头)反向
                                  # 移动超过这个百分比 -> 立即提交close决策,不经过Trader。
                                  # 比daily_loss_freeze_pct(8%,账户级)更紧,因为这是
                                  # 单仓位级别的哨兵,不是替代circuit_breaker的组合熔断
  mark_interval_minutes: 1       # 用户2026-07-15要求盈亏刷新到1分钟(原5分钟)。
                                  # 原始说明:用户要求(2026-07-14)面板的"未实现盈亏"更实时——
                                  # 这里从原来跟哨兵共用的60分钟节拍拆出来,独立控制
                                  # "多久重新拉一次实时价格、重算标记价/浮盈浮亏"这件
                                  # 事,不影响上面interval_hours控制的哨兵判定本身。
                                  # 5分钟意味着每5分钟一次全universe(9个标的)的
                                  # ticker拉取,OKX公开行情接口的限速远高于这个量级,
                                  # 不是问题;没有做成每分钟甚至更快,是因为面板本身
                                  # 前端也只每15秒刷新一次显示,拉太快只是浪费调用量、
                                  # 用户实际看不出差别。
